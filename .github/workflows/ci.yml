name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build UniDataGen.slnx -c Release --nologo
      - run: dotnet test tests/UniDataGen.Core.Tests -c Release --nologo
      - run: dotnet test tests/UniDataGen.Targets.Tests -c Release --nologo
